name: QA Gradle
description: Run QA tests with different Gradle versions

inputs:
  gradle-version:
    required: true
  android-gradle-version:
    required: true
  sonar-runtime-version:
    required: false
  develocity-url:
    required: false
    default: ""
  use-develocity:
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - uses: jdx/mise-action@5ac50f778e26fac95da98d50503682459e86d566 # v3.2.0
      with:
        version: 2025.7.12
    - name: Get Vault secrets
      id: secrets
      uses: SonarSource/vault-action-wrapper@v3
      with:
        secrets: |
          development/github/token/licenses-ro token | GITHUB_TOKEN;
          development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader access_token | ARTIFACTORY_ACCESS_TOKEN;
    - name: Configure Maven
      uses: SonarSource/ci-github-actions/config-maven@v1
      with:
        artifactory-reader-role: private-reader
        working-directory: integrationTests
        use-develocity: ${{ inputs.use-develocity }}
        develocity-url: ${{ inputs.develocity-url }}
    - name: Set Orchestrator Cache Variables
      shell: bash
      run: |
        CACHE_MONTH=$(date +'%Y-%m')
        echo "ORCHESTRATOR_CACHE_MONTH=$CACHE_MONTH" >> $GITHUB_ENV
        echo "ORCHESTRATOR_HOME=${{ github.workspace }}/orchestrator" >> $GITHUB_ENV
    - name: Cache Orchestrator
      uses: SonarSource/gh-action_cache@v1
      with:
        path: ${{ env.ORCHESTRATOR_HOME }}
        key: orchestrator-${{ env.ORCHESTRATOR_CACHE_MONTH }}-${{ github.run_id }}
        restore-keys: orchestrator-${{ env.ORCHESTRATOR_CACHE_MONTH }}-
    - name: Setup Orchestrator Home Directory
      shell: bash
      run: |
        mkdir -p "$ORCHESTRATOR_HOME"
        ls -lRh "$ORCHESTRATOR_HOME"
    - name: Run QA
      env:
        GITHUB_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).GITHUB_TOKEN }}
        ARTIFACTORY_ACCESS_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_ACCESS_TOKEN }}
        SONARSOURCE_QA: true
        GRADLE_VERSION: ${{ inputs.gradle-version }}
        ANDROID_GRADLE_VERSION: ${{ inputs.android-gradle-version }}
        SONAR_RUNTIME_VERSION: ${{ inputs.sonar-runtime-version }}
      shell: bash
      run: |
        source ./.github/scripts/set-version-from-build-number.sh
        mvn -f property-dump-plugin/pom.xml --batch-mode install
        cd integrationTests
        mvn --errors --batch-mode --no-transfer-progress org.codehaus.mojo:versions-maven-plugin:2.7:set -DnewVersion="${NEW_VERSION}" -DgenerateBackupPoms=false
        mvn --errors --batch-mode --no-transfer-progress clean verify -Dgradle.version="${GRADLE_VERSION}" -DandroidGradle.version="${ANDROID_GRADLE_VERSION}" -Dsonar.runtimeVersion="${SONAR_RUNTIME_VERSION}"
